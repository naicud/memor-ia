services:
  memoria-mcp:
    build: .
    ports:
      - "${MEMORIA_PORT:-8080}:8080"
    environment:
      - MEMORIA_TRANSPORT=http
      - MEMORIA_HOST=0.0.0.0
      - MEMORIA_PORT=8080
      - MEMORIA_GRAPH_HOST=falkordb
      - MEMORIA_GRAPH_PORT=6379
      - MEMORIA_VECTOR_DB=/app/data/vectors.db
      - MEMORIA_DATA_DIR=/app/data
    volumes:
      - memoria-data:/app/data
    depends_on:
      falkordb:
        condition: service_started
    restart: unless-stopped

  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "${FALKORDB_PORT:-6379}:6379"
    volumes:
      - falkordb-data:/data
    restart: unless-stopped

volumes:
  memoria-data:
  falkordb-data:
